<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivionline - Canlı Saldırı Takibi</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/docsystem/docs.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .attack-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 20px;
        }
        .attack-table th {
            text-align: left;
            padding: 15px;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
        }
        .attack-table td {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }
        .attack-table tr td:first-child { border-radius: 10px 0 0 10px; }
        .attack-table tr td:last-child { border-radius: 0 10px 10px 0; }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .live-indicator {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
        <div class="glass-panel" style="padding: 20px; text-align: center; border-top: 4px solid #f87171;">
            <div style="font-size: 12px; color: var(--text-muted);">GÜNÜN KAZANANI</div>
            <div id="winner-day" style="font-family: 'JetBrains Mono'; margin: 10px 0; color: #ef4444;">-</div>
            <div id="hits-day" style="font-size: 20px; font-weight: bold;">0 İSTEK</div>
        </div>
        <div class="glass-panel" style="padding: 20px; text-align: center; border-top: 4px solid #fbbf24;">
            <div style="font-size: 12px; color: var(--text-muted);">HAFTANIN KAZANANI</div>
            <div id="winner-week" style="font-family: 'JetBrains Mono'; margin: 10px 0; color: #f59e0b;">-</div>
            <div id="hits-week" style="font-size: 20px; font-weight: bold;">0 İSTEK</div>
        </div>
        <div class="glass-panel" style="padding: 20px; text-align: center; border-top: 4px solid #61afef;">
            <div style="font-size: 12px; color: var(--text-muted);">AYIN KAZANANI</div>
            <div id="winner-month" style="font-family: 'JetBrains Mono'; margin: 10px 0; color: #3b82f6;">-</div>
            <div id="hits-month" style="font-size: 20px; font-weight: bold;">0 İSTEK</div>
        </div>
    </div>

    <div class="docs-layout" style="max-width: 1200px;">
        <main class="docs-content glass-panel" style="width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h1 style="margin-bottom: 5px; border: none;">Saldırı Girişimleri</h1>
                    <p style="color: var(--text-muted); font-size: 14px;">
                        <span class="live-indicator"></span> Canlı İzleniyor...
                    </p>
                </div>
                <div id="last-update" style="font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono';"></div>
            </div>

            <table class="attack-table">
                <thead>
                    <tr>
                        <th>Hedef Yol (Path)</th>
                        <th>Toplam İstek</th>
                        <th>Tekil Bot (IP)</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="attack-stats-body">
                    </tbody>
            </table>
        </main>
    </div>

    <script src="/navbar.js"></script>
    <script src="/ataklari_izle_krdsm.js"></script>
</body>
</html>
