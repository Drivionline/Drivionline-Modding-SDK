<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil ve Ayarlar - Drivionline</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .hidden { display: none; }
    </style>
    <link rel="shortcut icon" href="/favicon.png?v=2" type="image/png">
</head>
<body>

    <div id="navbar-container"></div>

    <div class="container">
        <div class="dashboard-grid">
            
            <div class="panel-box">
                <div class="panel-header" style="border-top: 2px solid #4caf50;">Profil ve Kimlik</div>
                <div class="panel-content">
                    <p style="margin-top: 0; font-size: 13px; color: #aaa;">Kayıtlı E-Posta: <strong id="userEmailTxt" style="color: #fff;">...</strong></p>
                    
                    <form id="nicknameForm" style="margin-top: 15px;">
                        <div class="form-group">
                            <label>Takma Adın (Nickname)</label>
                            <input type="text" id="newNickname" class="form-input" required>
                        </div>
                        <button type="submit" class="btn" id="nickSubmitBtn" style="width: 100%;">Takma Adı Güncelle</button>
                    </form>
                    <div id="nickAlert" class="alert-error" style="margin-top: 10px;"></div>
                </div>
            </div>

            <div class="panel-box" id="passwordPanel">
                <div class="panel-header" style="border-top: 2px solid #b71c1c;">Güvenlik (Şifre İşlemleri)</div>
                <div class="panel-content">
                    <p style="margin-top: 0; font-size: 13px; color: #aaa;">Şifreni değiştirmek için kayıtlı e-posta adresine bir onay kodu gönderilecek.</p>
                    
                    <button id="requestResetBtn" class="btn" style="width: 100%; margin-bottom: 15px;">Şifre Sıfırlama Kodu Gönder</button>
                    
                    <form id="resetPasswordForm" class="hidden">
                        <div class="form-group">
                            <label>E-Postana Gelen Kod</label>
                            <input type="text" id="resetCode" class="form-input" autocomplete="off" required>
                        </div>
                        <div class="form-group">
                            <label>Yeni Şifre</label>
                            <input type="password" id="newPassword" class="form-input" required>
                        </div>
                        <button type="submit" class="btn" id="resetSubmitBtn" style="width: 100%; background: linear-gradient(to bottom, #5e1b1b 0%, #330000 100%); border-color: #ff5252;">Kodu Onayla ve Şifreyi Değiştir</button>
                    </form>
                    <div id="passAlert" class="alert-error" style="margin-top: 10px;"></div>
                </div>
            </div>
            
            <div class="panel-box" id="claimAccountPanel" style="display: none;">
                <div class="panel-header" style="border-top: 2px solid #ff9800;">Hesabı Kalıcı Hale Getir</div>
                <div class="panel-content">
                    <p style="margin-top: 0; font-size: 13px; color: #aaa;">Misafir hesabınızı kaybetmemek ve kendi sunucunuzu açabilmek için geçerli bir e-posta adresi bağlayın.</p>

                    <form id="claimRequestForm">
                        <div class="form-group">
                            <label>Gerçek E-Posta Adresiniz</label>
                            <input type="email" id="claimEmail" class="form-input" required>
                        </div>
                        <button type="submit" class="btn" id="claimReqBtn" style="width: 100%; background: linear-gradient(to bottom, #b26a00 0%, #663d00 100%); border-color: #ff9800;">Doğrulama Kodu Gönder</button>
                    </form>

                    <form id="claimVerifyForm" class="hidden" style="margin-top: 15px;">
                        <div class="form-group">
                            <label>E-Postanıza Gelen Kod</label>
                            <input type="text" id="claimCode" class="form-input" autocomplete="off" required>
                        </div>
                        <button type="submit" class="btn" id="claimVerBtn" style="width: 100%; background: linear-gradient(to bottom, #1b5e20 0%, #003300 100%); border-color: #4caf50;">Kodu Onayla ve Hesabı Bağla</button>
                    </form>

                    <div id="claimAlert" class="alert-error" style="margin-top: 10px;"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="footer-container"></div>
    
    <script src="/footer.js"></script>
    <script src="navbar.js"></script>
    <script src="session.js"></script>
    <script src="profile.js"></script>
</body>
</html>
