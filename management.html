<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunucu Yönetimi - Drivionline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/favicon.png?v=2" type="image/png">
</head>
<body>

    <div id="navbar-container"></div>

    <div class="container">
        
        <div class="control-panel glass-panel">
            <div class="form-group" style="margin-bottom: 0; flex-grow: 1; min-width: 250px;">
                <label>Yönetilecek Sunucu</label>
                <select id="serverSelect" class="form-input">
                    <option value="">Sunucularınız aranıyor...</option>
                </select>
            </div>
            
            <div class="form-group" style="margin-bottom: 0; width: 220px;">
                <label>Varsayılan Ban Süresi (Dk)</label>
                <input type="number" id="banDurationInput" class="form-input" value="1440">
                <div class="ban-hints">
                    <span class="hint-warn">⏱ 60 (1 Saat)</span>
                    <span class="hint-warn">⏱ 1440 (1 Gün)</span>
                    <span class="hint-danger">⏱ 0 (Kalıcı)</span>
                </div>
            </div>

            <button class="btn" id="loadPlayersBtn" style="display: none; margin-top: 22px;">Listeleri Yenile</button>
        </div>

        <div class="panel-box">
            <div class="panel-header">Aktif Oyuncular</div>
            <div class="panel-content" style="padding: 10px 20px 20px 20px;">
                <table class="server-table">
                    <thead>
                        <tr>
                            <th>DB ID</th>
                            <th>Kullanıcı Adı</th>
                            <th>Araç</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="playerListBody">
                        <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Lütfen bir sunucu seçin.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel-box ban-panel">
            <div class="panel-header" style="color: #ff4d4d;">Banlı Oyuncular</div>
            <div class="panel-content" style="padding: 10px 20px 20px 20px;">
                <table class="server-table">
                    <thead>
                        <tr>
                            <th>DB ID</th>
                            <th>Sebep</th>
                            <th>Bitiş Süresi</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="banListBody">
                        <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Lütfen bir sunucu seçin.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="footer-container"></div>
    
    <script src="/footer.js"></script>
    <script src="navbar.js"></script>
    <script src="session.js"></script>
    <script src="management.js"></script>
</body>
</html>
